name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
        
      - name: Install build tools
        run: python -m pip install --upgrade hatchling build
        
      - name: Install package and dev dependencies
        # CHANGE THIS LINE: Added [dev] to install pytest and other test tools
        run: python -m pip install -e ".[dev]"
        
      - name: Run tests
        run: python -m pytest
        
      - name: Check CLI help
        run: |
          python -m trushell --help
          trushell --help
          
      - name: Build wheel
        run: python -m build --wheel

  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/trushell
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
